name: ci-pr-test

on:
    pull_request:
        branches:
            - main

permissions:
    id-token: write
    contents: read
    pull-requests: read

jobs:
    test-only:
        uses: ./.github/workflows/reusable-service-pipeline.yml
        secrets: inherit
        with:
            base_ref: ${{ github.base_ref }}
            run_build_push: false
