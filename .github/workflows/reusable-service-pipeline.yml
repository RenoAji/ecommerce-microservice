name: reusable-service-pipeline

on:
  workflow_call:
    inputs:
      base_ref:
        description: Base ref/sha used by paths-filter
        required: true
        type: string
      run_build_push:
        description: Run docker build and push after tests
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ inputs.base_ref }}
          filters: |
            cart-service:
              - cart-service/**
              - libs/**
              - proto/**
              - .github/workflows/ci-pr-test.yml
              - .github/workflows/cd-main.yml
              - .github/workflows/reusable-service-pipeline.yml
            order-service:
              - order-service/**
              - libs/**
              - proto/**
              - .github/workflows/ci-pr-test.yml
              - .github/workflows/cd-main.yml
              - .github/workflows/reusable-service-pipeline.yml
            payment-service:
              - payment-service/**
              - libs/**
              - proto/**
              - .github/workflows/ci-pr-test.yml
              - .github/workflows/cd-main.yml
              - .github/workflows/reusable-service-pipeline.yml
            product-service:
              - product-service/**
              - libs/**
              - proto/**
              - .github/workflows/ci-pr-test.yml
              - .github/workflows/cd-main.yml
              - .github/workflows/reusable-service-pipeline.yml
            user-service:
              - user-service/**
              - libs/**
              - .github/workflows/ci-pr-test.yml
              - .github/workflows/cd-main.yml
              - .github/workflows/reusable-service-pipeline.yml
            delivery-service:
              - delivery-service/**
              - libs/**
              - proto/**
              - .github/workflows/ci-pr-test.yml
              - .github/workflows/cd-main.yml
              - .github/workflows/reusable-service-pipeline.yml

  pipeline:
    needs:
      - changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false # Ensure all services are tested even if one fails
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: go.work.sum

      - name: Install Protoc & Plugins
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate gRPC Code
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          # Tip: If your proto files grow, consider a 'buf generate' or a wildcard
          protoc --go_out=. --go-grpc_out=. proto/*.proto

      - name: Verify & Test
        run: |
          go mod download -C ${{ matrix.service }}
          go build -C ${{ matrix.service }} -v ./...
          go test -C ${{ matrix.service }} -v -cover ./...
          go test -C ${{ matrix.service }} -v -tags=integration -count=1 ./...

      # Only runs if 'run_build_push' is true AND 'Verify & Test' passed
      - name: Log in to GHCR
        if: ${{ inputs.run_build_push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ inputs.run_build_push }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}

      - name: Build and push Docker image
        if: ${{ inputs.run_build_push }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          build-contexts: |
            libs=./libs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs: pipeline
    if: ${{ inputs.run_build_push && needs.pipeline.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Print OIDC token claims
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange")
          echo $TOKEN | python3 -c "
          import sys, json, base64
          token = json.load(sys.stdin)['value']
          payload = token.split('.')[1]
          payload += '=' * (4 - len(payload) % 4)
          print(json.dumps(json.loads(base64.b64decode(payload)), indent=2))
          "
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            DEPLOY_SCRIPT="
              cd /home/septareno/app
              echo '${{ secrets.GITHUB_TOKEN }}' | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
              docker compose -f docker-compose.yml -f docker-compose.azure.yml pull
              docker compose -f docker-compose.yml -f docker-compose.azure.yml up -d
              docker image prune -f
              "
            az role assignment create \
            --assignee "${{ secrets.AZURE_CLIENT_ID }}" \
            --role "Virtual Machine Contributor" \
            --scope "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.VM_GROUP }}"
                      az account show
                      az vm start --resource-group ${{secrets.VM_GROUP}} --name ${{secrets.VM_NAME}}   
            # Execute via Azure CLI
            az vm run-command invoke \
              -g ${{secrets.VM_GROUP}} \
              -n ${{secrets.VM_NAME}} \
              --command-id RunShellScript \
              --scripts "$DEPLOY_SCRIPT"
