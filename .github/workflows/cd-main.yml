name: cd-main

on:
    push:
        branches:
            - main

permissions:
    contents: read
    pull-requests: read
    packages: write

jobs:
    test-build-push:
        uses: ./.github/workflows/reusable-service-pipeline.yml
        secrets: inherit
        with:
            base_ref: ${{ github.event.before }}
            run_build_push: true
