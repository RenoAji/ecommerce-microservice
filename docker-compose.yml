services:
  # ELK Stack for centralized logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    volumes:
      - es_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - elk
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    networks:
      - elk
    ports:
      - "5044:5044" # Logstash Beats input
    depends_on:
      - elasticsearch
    stdin_open: true
    tty: true
    restart: always

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    privileged: true
    networks:
      - elk
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro,Z
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - nginx_logs:/var/log/nginx:ro
    command: filebeat -e -strict.perms=false
    depends_on:
      - logstash

  # --- INFRASTRUCTURE ---
  gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - app-network

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${USER_DB_NAME:-user_db}
    ports:
      - "${USER_DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${USER_DB_NAME:-user_db}",
        ]
      interval: 5s
      timeout: 5s
    networks:
      - app-network
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  product-db:
    image: postgres:15-alpine
    container_name: product-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PRODUCT_DB_NAME:-product_db}
    ports:
      - "${PRODUCT_DB_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d
            ${PRODUCT_DB_NAME:-product_db}",
        ]
      interval: 5s
      timeout: 5s
    networks:
      - app-network
    volumes:
      - product_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  consul:
    image: hashicorp/consul:1.21
    container_name: consul
    command: [ "agent", "-dev", "-client=0.0.0.0", "-ui" ]
    ports:
      - "8500:8500"
    healthcheck:
      test: [ "CMD", "consul", "info" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  order-db:
    image: postgres:15-alpine
    container_name: order-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${ORDER_DB_NAME:-order_db}
    ports:
      - "${ORDER_DB_PORT:-5434}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${ORDER_DB_NAME:-order_db}",
        ]
      interval: 5s
      timeout: 5s
    networks:
      - app-network
    volumes:
      - order_postgres_data:/var/lib/postgresql/data

  payment-db:
    image: postgres:15-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PAYMENT_DB_NAME:-payment_db}
    ports:
      - "${PAYMENT_DB_PORT:-5435}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d
            ${PAYMENT_DB_NAME:-payment_db}",
        ]
      interval: 5s
      timeout: 5s
    networks:
      - app-network
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data

  delivery-db:
    image: postgres:15-alpine
    container_name: delivery-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DELIVERY_DB_NAME:-delivery_db}
    ports:
      - "${DELIVERY_DB_PORT:-5436}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d
            ${DELIVERY_DB_NAME:-delivery_db}",
        ]
      interval: 5s
      timeout: 5s
    networks:
      - app-network
    volumes:
      - delivery_postgres_data:/var/lib/postgresql/data

  # --- SERVICE SKELETONS ---
  user-service:
    build:
      context: ./user-service
      additional_contexts:
        libs: ./libs
        vendor: ./vendor
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${USER_DB_NAME:-user_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - app-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
      additional_contexts:
        libs: ./libs
        vendor: ./vendor
    environment:
      DB_HOST: product-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${PRODUCT_DB_NAME:-product_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET:-dev_internal_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      CONSUL_ADDR: consul:8500
    depends_on:
      product-db:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - app-network

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
      additional_contexts:
        libs: ./libs
        vendor: ./vendor
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET:-dev_internal_secret}
      CONSUL_ADDR: consul:8500
    depends_on:
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - app-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
      additional_contexts:
        libs: ./libs
        vendor: ./vendor
    environment:
      DB_HOST: order-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${ORDER_DB_NAME:-order_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET:-dev_internal_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      CONSUL_ADDR: consul:8500
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - app-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
      additional_contexts:
        libs: ./libs
        vendor: ./vendor
    environment:
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${PAYMENT_DB_NAME:-payment_db}
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET:-dev_internal_secret}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-""}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-""}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      CONSUL_ADDR: consul:8500
    depends_on:
      payment-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - app-network

  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
      additional_contexts:
        libs: ./libs
        vendor: ./vendor
    environment:
      DB_HOST: delivery-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DELIVERY_DB_NAME:-delivery_db}
      SERVER_PORT: 8081
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET:-dev_internal_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      CONSUL_ADDR: consul:8500
    depends_on:
      delivery-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  elk:
    driver: bridge

volumes:
  user_postgres_data:
  product_postgres_data:
  order_postgres_data:
  payment_postgres_data:
  delivery_postgres_data:
  es_data:
  nginx_logs:
