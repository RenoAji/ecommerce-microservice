services:
  # --- API GATEWAY ---
  gateway:
    restart: always

  # --- USER SERVICE ---
  user-service:
    build:
      dockerfile: Dockerfile # Points to the optimized Multi-stage Dockerfile
    restart: always

  user-db:
    ports: []
    restart: always

  # --- PRODUCT SERVICE ---
  product-service:
    build:
      dockerfile: Dockerfile
    restart: always
    # No local volumes for production

  product-db:
    ports: []
    restart: always

  # --- CART SERVICE ---
  cart-service:
    build:
      dockerfile: Dockerfile
    restart: always

  redis:
    restart: always

  consul:
    restart: always
    command: ["agent", "-dev", "-log-level=warn"]

  # --- ORDER SERVICE ---
  order-service:
    build:
      dockerfile: Dockerfile
    restart: always

  order-db:
    ports: []
    restart: always

  # --- PAYMENT SERVICE ---
  payment-service:
    build:
      dockerfile: Dockerfile
    restart: always

  payment-db:
    ports: []
    restart: always

  # --- DELIVERY SERVICE ---
  delivery-service:
    build:
      dockerfile: Dockerfile
    restart: always

  delivery-db:
    ports: []
    restart: always
